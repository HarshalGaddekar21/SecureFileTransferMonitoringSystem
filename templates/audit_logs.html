{% extends "base.html" %}

{% block title %}
Audit Logs
{% endblock %}

{% block content %}

<div class="container-fluid">

    <h2 class="mb-4">
        <i class="bi bi-journal-text"></i>
        Audit Logs
    </h2>

    <div class="card shadow">

        <div class="card-body table-responsive">

            <table class="table table-striped table-hover">

                <thead class="table-dark">

                    <tr>

                        <th>ID</th>
                        <th>Timestamp</th>
                        <th>User</th>
                        <th>Action</th>
                        <th>Details</th>

                    </tr>

                </thead>

                <tbody>

                {% for log in logs %}

                    <tr>

                        <td>{{ log["id"] }}</td>
                        <td>{{ log["timestamp"] }}</td>
                        <td>{{ log["username"] }}</td>
                        <td>{{ log["action"] }}</td>
                        <td>{{ log["details"] }}</td>

                    </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
