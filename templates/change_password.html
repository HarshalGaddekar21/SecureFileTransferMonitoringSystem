{% extends "base.html" %}

{% block title %}
Change Password
{% endblock %}

{% block content %}

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">

                    <h3>

                        <i class="bi bi-key-fill"></i>

                        Change Password

                    </h3>

                </div>

                <div class="card-body">

                    {% if error %}

                    <div class="alert alert-danger">

                        {{ error }}

                    </div>

                    {% endif %}

                    {% if success %}

                    <div class="alert alert-success">

                        {{ success }}

                    </div>

                    {% endif %}

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">

                                Current Password

                            </label>

                            <input
                                type="password"
                                name="current_password"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                New Password

                            </label>

                            <input
                                type="password"
                                name="new_password"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Confirm New Password

                            </label>

                            <input
                                type="password"
                                name="confirm_password"
                                class="form-control"
                                required>

                        </div>

                        <button
                            class="btn btn-primary">

                            <i class="bi bi-key-fill"></i>

                            Change Password

                        </button>

                        <a
                            href="/profile"
                            class="btn btn-secondary">

                            Cancel

                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
