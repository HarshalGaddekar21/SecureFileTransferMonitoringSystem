{% extends "base.html" %}

{% block title %}
Add User
{% endblock %}

{% block content %}

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow">

                <div class="card-header bg-success text-white">

                    <h4>

                        <i class="bi bi-person-plus-fill"></i>

                        Add New User

                    </h4>

                </div>

                <div class="card-body">


                    {% if error %}

                    <div class="alert alert-danger">

                        {{ error }}

                    </div>

                    {% endif %}


                    <form method="POST">

                        <div class="mb-3">

                            <label>Full Name</label>

                            <input
                                class="form-control"
                                name="full_name"
                                required>

                        </div>

                        <div class="mb-3">

                            <label>Username</label>

                            <input
                                class="form-control"
                                name="username"
                                required>

                        </div>

                        <div class="mb-3">

                            <label>Password</label>

                            <input
                                type="password"
                                class="form-control"
                                name="password"
                                required>

                        </div>

                        <div class="mb-3">

                            <label>Role</label>

                            <select
                                class="form-select"
                                name="role">

                                <option>Administrator</option>

                                <option>Security Analyst</option>

                                <option>User</option>

                            </select>

                        </div>

                        <button class="btn btn-success">

                            Create User

                        </button>

                        <a
                            href="/users"
                            class="btn btn-secondary">

                            Cancel

                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
